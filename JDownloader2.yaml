name: jdownloader2
services:
  jdownloader2:
    cpu_shares: 90
    container_name: jdownloader2
    deploy:
      resources:
        limits:
          memory: 7367M
    environment:
      - GROUP_ID=1000
      - JDOWNLOADER_HEADLESS=
      - MYJDOWNLOADER_DEVICE_NAME=
      - MYJDOWNLOADER_EMAIL=
      - MYJDOWNLOADER_PASSWORD=
      - TZ=Etc/UTC
      - USER_ID=1000
    hostname: jdownloader2
    image: jlesage/jdownloader-2:latest
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/JDownloader2/icon.png
    ports:
      - target: 5800
        published: "5800"
        protocol: tcp
      - target: 5900
        published: "5900"
        protocol: tcp
      - target: 3129
        published: "3129"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/jdownloader2/config
        target: /config
      - type: bind
        source: /DATA/AppData
        target: /output
    devices: []
    cap_add: []
    command: []
    networks:
      - default
    privileged: false
networks:
  default:
    name: jdownloader2_default
x-casaos:
  architectures:
    - amd64
    - arm64
  author: Fabio Tea
  category: Utilities
  description:
    en_us: JDownloader is a free, open-source download management tool with a huge
      community that makes downloading as easy and fast as it should be. Users
      can start, stop or pause downloads, set bandwith limitations, auto-extract
      archives and much more. It's an easy-to-extend framework that can save
      hours of your valuable time every day!
    zh_cn: JDownloader是一个免费的、开源的下载管理工具，拥有庞大的社区，使下载变得简单而快速。用户可以启动、停止或暂停下载，设置带宽限制，自动解压缩存档等等。它是一个易于扩展的框架，可以每天节省您宝贵时间的数小时！
  developer: jdownloader
  hostname: ""
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/JDownloader2/icon.png
  index: /
  is_uncontrolled: false
  main: jdownloader2
  port_map: "5800"
  scheme: http
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/JDownloader2/screenshot-1.jpg
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/JDownloader2/screenshot-2.jpg
  store_app_id: jdownloader2
  tagline:
    en_us: Free & open-source download management tool
    zh_cn: 免费且开源的下载管理工具
  title:
    custom: ""
    en_us: JDownloader2
